name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, macos-portability]
  pull_request:
    branches: [main, macos-portability]

jobs:
  build-and-test:
    name: Linux user-runner (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v5
      - name: Install runtime test dependencies
        run: sudo apt-get update && sudo apt-get install -y socat
      - name: Build static and dynamic with strict warnings, then run regression suite
        run: |
          make clean
          make CC=${{ matrix.cc }} CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"
          make clean
          make sigmund-dynamic CC=${{ matrix.cc }} CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"
          make test CC=${{ matrix.cc }} CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"

  root-runner-test:
    name: Linux root-runner harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install runtime test dependencies
        run: sudo apt-get update && sudo apt-get install -y socat
      - name: Run the same test suite with the harness process starting as root
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          mkdir "$tmpdir/src"
          tar --exclude=.git --exclude=sigmund --exclude=sigmund-dynamic -cf - . | tar -xf - -C "$tmpdir/src"
          chmod -R a+rX "$tmpdir"
          sudo bash -c 'cd "$1"; umask 022; make clean; make test CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"' bash "$tmpdir/src"

  macos-runtime:
    name: macOS runtime test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            uname_m: arm64
          - runner: macos-15-intel
            arch: x86_64
            uname_m: x86_64
    steps:
      - uses: actions/checkout@v5
      - name: Validate runner architecture
        run: test "$(uname -m)" = "${{ matrix.uname_m }}"
      - name: Build and run tests on macOS
        run: |
          make clean
          make CC=clang STATIC_LDFLAGS= CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"
          make clean
          make test CC=clang STATIC_LDFLAGS= CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install runtime test dependencies
        run: sudo apt-get update && sudo apt-get install -y socat
      - name: Run tests with ASan/UBSan to catch memory and UB regressions
        run: |
          make clean
          make test CC=gcc CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -O1 -g -fsanitize=address,undefined" STATIC_LDFLAGS='' LDFLAGS='-fsanitize=address,undefined' TEST_LDFLAGS='-fsanitize=address,undefined'

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Static analysis for suspicious patterns before release
        run: cppcheck --enable=warning,performance,portability --error-exitcode=1 --suppress=missingIncludeSystem --std=c11 src/sigmund.c
