name: Multi-arch Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - macos-portability
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - macos-portability

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.version.outputs.value }}
      base: ${{ steps.version.outputs.base }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve version from VERSION
        id: version
        run: bash ./.github/scripts/resolve_version.sh --github-output

  test:
    name: Test (ubuntu amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install runtime test dependencies
        run: sudo apt-get update && sudo apt-get install -y socat
      - name: Build static and dynamic
        run: |
          make clean
          make
          make clean
          make sigmund-dynamic
      - name: Run test suite
        run: make test

  build-gnu:
    name: Build GNU (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64-gnu-static
            dockcross_image: ""
            make_target: sigmund
            static_ldflags: -static
            package_binary: sigmund
          - target: linux-amd64-gnu-dynamic
            dockcross_image: ""
            make_target: sigmund-dynamic
            static_ldflags: ''
            package_binary: sigmund-dynamic
          - target: linux-arm64-gnu-static
            dockcross_image: dockcross/linux-arm64
            make_target: sigmund
            static_ldflags: -static
            package_binary: sigmund
          - target: linux-arm64-gnu-dynamic
            dockcross_image: dockcross/linux-arm64
            make_target: sigmund-dynamic
            static_ldflags: ''
            package_binary: sigmund-dynamic
          - target: linux-armhf-gnu-static
            dockcross_image: dockcross/linux-armv7
            make_target: sigmund
            static_ldflags: -static
            package_binary: sigmund
          - target: linux-armhf-gnu-dynamic
            dockcross_image: dockcross/linux-armv7
            make_target: sigmund-dynamic
            static_ldflags: ''
            package_binary: sigmund-dynamic
    steps:
      - uses: actions/checkout@v5

      - name: Build binary (native GNU)
        if: matrix.dockcross_image == ''
        run: |
          make clean
          make ${{ matrix.make_target }} STATIC_LDFLAGS='${{ matrix.static_ldflags }}'

      - name: Build binary (dockcross GNU)
        if: matrix.dockcross_image != ''
        run: |
          docker run --rm "${{ matrix.dockcross_image }}" > dockcross
          chmod +x dockcross
          ./dockcross bash -lc "make clean && make ${{ matrix.make_target }} STATIC_LDFLAGS='${{ matrix.static_ldflags }}'"

      - name: Package tarball
        run: |
          mkdir -p dist
          ./.github/scripts/package_tarball.sh "${{ matrix.target }}" "${{ needs.version.outputs.value }}" "${{ matrix.package_binary }}" dist

      - name: Upload GNU artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-musl:
    name: Build musl (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64-musl-static
            zig_target: x86_64-linux-musl
          - target: linux-arm64-musl-static
            zig_target: aarch64-linux-musl
          - target: linux-armhf-musl-static
            zig_target: arm-linux-musleabihf
          - target: linux-mipsel-musl-static
            zig_target: mipsel-linux-musl
          - target: linux-riscv64-musl-static
            zig_target: riscv64-linux-musl
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned Zig
        env:
          ZIG_VERSION: 0.13.0
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          mv "zig-linux-x86_64-${ZIG_VERSION}" zig
          echo "${PWD}/zig" >> "$GITHUB_PATH"

      - name: Build musl static binary
        run: |
          make clean
          make CC='zig cc -target ${{ matrix.zig_target }}' CFLAGS='-std=c11 -Wall -Wextra -Wpedantic -O2 -s' STATIC_LDFLAGS='-static'

      - name: Package tarball
        run: |
          mkdir -p dist
          ./.github/scripts/package_tarball.sh "${{ matrix.target }}" "${{ needs.version.outputs.value }}" sigmund dist

      - name: Upload musl artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-15
            arch: arm64
            uname_m: arm64
          - target: macos-x86_64
            runner: macos-15-intel
            arch: x86_64
            uname_m: x86_64
    steps:
      - uses: actions/checkout@v5

      - name: Validate runner architecture
        run: test "$(uname -m)" = "${{ matrix.uname_m }}"

      - name: Build macOS binary
        run: |
          make clean
          make CC=clang STATIC_LDFLAGS='' CFLAGS='-std=c11 -Wall -Wextra -Wpedantic -Werror -O2'
          file sigmund

      - name: Package tarball
        run: |
          mkdir -p dist
          ./.github/scripts/package_tarball.sh "${{ matrix.target }}" "${{ needs.version.outputs.value }}" sigmund dist

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs:
      - version
      - build-gnu
      - build-musl
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: Prepare installer
        run: bash ./.github/scripts/prepare_installer.sh "${{ needs.version.outputs.tag }}" dist

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum sigmund-*.tar.gz install.sh > SHA256SUMS

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/install.sh
            dist/sigmund-*.tar.gz
            dist/SHA256SUMS

      - name: Smoke-test GitHub one-line installer
        run: |
          install_tmp="$(mktemp -d)"
          trap 'rm -rf "$install_tmp"' EXIT
          curl -LsSf --retry 5 --retry-delay 2 \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ needs.version.outputs.tag }}/install.sh" |
            SIGMUND_INSTALL_DIR="$install_tmp/bin" SIGMUND_UPDATE_PROFILE=0 sh
          installed_version="$("$install_tmp/bin/sigmund" --version)"
          test "$installed_version" = "${{ needs.version.outputs.tag }}"
