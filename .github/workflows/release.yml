name: Multi-arch Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - macos-portability
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - macos-portability

permissions:
  contents: read

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.version.outputs.value }}
      base: ${{ steps.version.outputs.base }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Resolve version from VERSION
        id: version
        run: bash ./.github/scripts/resolve_version.sh --github-output

  test:
    name: Test (ubuntu amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build static and dynamic
        run: |
          make clean
          make
          make clean
          make hold-dynamic
      - name: Assert release tests run as non-root
        run: test "$(id -u)" -ne 0
      - name: Run test suite
        run: make test

  privilege-delegation-test:
    name: Test privilege delegation (non-root, sudo per-test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run root-sensitive suite from a non-root sudoer
        run: bash scripts/test_root.sh

  build-gnu:
    name: Build GNU (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64-gnu-static
            dockcross_image: ""
            make_target: hold
            static_ldflags: -static
            package_binary: hold
          - target: linux-amd64-gnu-dynamic
            dockcross_image: ""
            make_target: hold-dynamic
            static_ldflags: ''
            package_binary: hold-dynamic
          - target: linux-arm64-gnu-static
            dockcross_image: dockcross/linux-arm64
            make_target: hold
            static_ldflags: -static
            package_binary: hold
          - target: linux-arm64-gnu-dynamic
            dockcross_image: dockcross/linux-arm64
            make_target: hold-dynamic
            static_ldflags: ''
            package_binary: hold-dynamic
          - target: linux-armhf-gnu-static
            dockcross_image: dockcross/linux-armv7
            make_target: hold
            static_ldflags: -static
            package_binary: hold
          - target: linux-armhf-gnu-dynamic
            dockcross_image: dockcross/linux-armv7
            make_target: hold-dynamic
            static_ldflags: ''
            package_binary: hold-dynamic
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build binary (native GNU)
        if: matrix.dockcross_image == ''
        run: |
          make clean
          make ${{ matrix.make_target }} STATIC_LDFLAGS='${{ matrix.static_ldflags }}'

      - name: Build binary (dockcross GNU)
        if: matrix.dockcross_image != ''
        run: |
          docker run --rm "${{ matrix.dockcross_image }}" > dockcross
          chmod +x dockcross
          ./dockcross bash -lc "make clean && make ${{ matrix.make_target }} STATIC_LDFLAGS='${{ matrix.static_ldflags }}'"

      - name: Package tarball
        run: |
          mkdir -p dist
          ./.github/scripts/package_tarball.sh "${{ matrix.target }}" "${{ needs.version.outputs.value }}" "${{ matrix.package_binary }}" dist

      - name: Upload GNU artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-musl:
    name: Build musl (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64-musl-static
            zig_target: x86_64-linux-musl
          - target: linux-arm64-musl-static
            zig_target: aarch64-linux-musl
          - target: linux-armhf-musl-static
            zig_target: arm-linux-musleabihf
          - target: linux-mipsel-musl-static
            zig_target: mipsel-linux-musl
          - target: linux-riscv64-musl-static
            zig_target: riscv64-linux-musl
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pinned Zig
        env:
          ZIG_VERSION: 0.13.0
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          mv "zig-linux-x86_64-${ZIG_VERSION}" zig
          echo "${PWD}/zig" >> "$GITHUB_PATH"

      - name: Build musl static binary
        run: |
          make clean
          make CC='zig cc -target ${{ matrix.zig_target }}' CFLAGS='-std=c11 -Wall -Wextra -Wpedantic -O2 -s' STATIC_LDFLAGS='-static'

      - name: Package tarball
        run: |
          mkdir -p dist
          ./.github/scripts/package_tarball.sh "${{ matrix.target }}" "${{ needs.version.outputs.value }}" hold dist

      - name: Upload musl artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-15
            arch: arm64
            uname_m: arm64
          - target: macos-x86_64
            runner: macos-15-intel
            arch: x86_64
            uname_m: x86_64
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate runner architecture
        run: test "$(uname -m)" = "${{ matrix.uname_m }}"

      - name: Run macOS-specific tests
        env:
          HOLD_EXPECT_UNAME_M: ${{ matrix.uname_m }}
        run: bash ./.github/scripts/test_macos_ci.sh

      - name: Build macOS binary
        run: |
          make clean
          make CC=clang STATIC_LDFLAGS='' CFLAGS='-std=c11 -Wall -Wextra -Wpedantic -Werror -O2'
          file hold

      - name: Package tarball
        run: |
          mkdir -p dist
          ./.github/scripts/package_tarball.sh "${{ matrix.target }}" "${{ needs.version.outputs.value }}" hold dist

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    needs:
      - version
      - test
      - privilege-delegation-test
      - build-gnu
      - build-musl
      - build-macos
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag matches resolved version
        run: test "${RELEASE_TAG}" = "${{ needs.version.outputs.tag }}"

      - uses: actions/download-artifact@v7
        with:
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: Prepare installer
        run: bash ./.github/scripts/prepare_installer.sh "${RELEASE_TAG}" dist

      - name: Prepare release notes
        run: bash ./.github/scripts/release_notes_from_changelog.sh "${RELEASE_TAG}" dist/RELEASE_NOTES.md

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum hold-*.tar.gz install.sh > SHA256SUMS

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: dist/RELEASE_NOTES.md
          overwrite_files: true
          files: |
            dist/install.sh
            dist/hold-*.tar.gz
            dist/SHA256SUMS

      - name: Smoke-test GitHub one-line installer
        run: |
          install_tmp="$(mktemp -d)"
          trap 'rm -rf "$install_tmp"' EXIT
          curl -LsSf --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/install.sh" |
            HOLD_INSTALL_DIR="$install_tmp/bin" HOLD_UPDATE_PROFILE=0 sh
          installed_version="$("$install_tmp/bin/hold" --version)"
          hold_version="$("$install_tmp/bin/hold" --version)"
          test "$installed_version" = "${RELEASE_TAG}"
          test "$hold_version" = "${RELEASE_TAG}"
